  - Check scope clarity.
  - Check story size.
  - Check dependencies.
  - Check acceptance criteria.
  - Check testability.
  - Check priority.
  - Check Definition of Ready.
related_templates:
  - jira-story-template.md
recommended_role_packs:
  - product-owner
  - hybrid-ba-po
